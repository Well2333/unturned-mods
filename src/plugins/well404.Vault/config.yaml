# Configuration for Personal Vault.
# Embedded as a resource; users can override it in the plugin's data directory.

# Base vault capacity in inventory grid cells (everyone gets at least this). Each stored item costs
# its grid footprint (size_x × size_y, e.g. a 2×2 ammo box = 4 cells); an item's internal stack/ammo
# count never counts. Editable in the web panel when well404.WebPanel is installed.
maxSlots: 50

# Per-permission capacity tiers: a player who holds the permission gets that capacity. A player takes
# the LARGEST capacity among the base and every tier they hold (so VIPs get bigger vaults).
# Administrators can edit the current effective capacity from Vault inspection.
tiers: {}
# Example:
# tiers:
#   "well404.vault.size.vip": 400
#   "well404.vault.size.mvp": 600

# Personal-vault capacity purchases. Purchased slots are added to the base/tier capacity.
personalPurchase:
  enabled: true
  maxSlots: 5000
  slotsPerPurchase: 10
  price: 100

# Shared party vault. Every member can store/withdraw and may spend their own balance to buy
# additional capacity for the party. Purchased capacity stays with the party when a member leaves.
teamVault:
  enabled: true
  baseSlots: 200
  maxSlots: 5000
  purchase:
    enabled: true
    slotsPerPurchase: 10
    price: 500
