# Translations for Essentials.
# Keys are referenced via IStringLocalizer, e.g. m_StringLocalizer["plugin_events:plugin_start"].
# Placeholders use SmartFormat, e.g. {player}, {seconds}, {symbol}.
plugin_events:
  plugin_start: "Essentials has been loaded."
  plugin_stop: "Essentials has been unloaded."

errors:
  not_a_player: "This command can only be used by a player."
  player_not_found: "Player not found: {player}"

teleport:
  warmup: "Hold still for {seconds}s to teleport..."
