# Configuration for Shop.
# Embedded as a resource; users can override it in the plugin's data directory.
# Requires well404.Economy (provides the currency).

discounts:
  # Off by default. When enabled, the best (lowest) multiplier the player is
  # granted via permissions applies to BUY prices. Example: 0.9 = 10% off.
  enabled: false
  tiers: {}
  # Example:
  # tiers:
  #   well404.shop.vip: 0.9
  #   well404.shop.mvp: 0.8

# Plain items: a single game item, referenced in /buy and /sell by its own item id
# (its display name comes from the game). buyPrice 0 = not buyable; sellPrice 0 = not sellable.
items:
  - itemId: 15
    buyPrice: 100
    sellPrice: 40

# Bundles: a named pack of several items, referenced by its own `id` in /buy and /sell.
# A bundle can be sold too when sellPrice > 0 (all contents are taken back).
bundles:
  - id: "starter"
    name: "Starter Pack"
    buyPrice: 500
    sellPrice: 0
    contents:
      - itemId: 15
        amount: 2
      - itemId: 81
        amount: 1
