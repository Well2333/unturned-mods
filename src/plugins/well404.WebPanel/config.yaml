# Configuration for Web Panel.
# Embedded as a resource; users can override it in the plugin's data directory.
#
# The panel is a shared host: other plugins (well404.Economy, well404.Shop, ...)
# register their own management modules into it, so this plugin stays generic.

web:
  # Interface to listen on:
  #   127.0.0.1  -> loopback only (default; reach it via an SSH tunnel / reverse proxy)
  #   0.0.0.0    -> all interfaces (public)
  #   192.168.x  -> a specific NIC address
  bindAddress: "127.0.0.1"

  # Panel port. Kept near the Unturned server ports (27015–27017) and clear of them, so it is easy
  # to forward alongside the game and avoids the common, often-occupied 8080.
  port: 27020

  # Secret admin token. The admin panel is ALWAYS served behind it as a path prefix:
  #   http://host:port/<token>/
  # The token IS the auth — a wrong/missing one returns a plain 404. Leave empty to have a
  # random token minted each run (printed in the server log at startup); set a stable value
  # here to keep the admin URL constant across restarts.
  token: ""

  # ---- Tunnel / reverse proxy (optional; exposes the panel without opening ports) ----
  # Launches an admin-installed CLI tunnel (NOT bundled/downloaded) and uses its public URL
  # for player /menu links and the admin URL. Hides the server's real IP; gives HTTPS for free.
  tunnel:
    enabled: false

    # type: "cloudflare" | "custom"
    #   cloudflare -> a no-account Cloudflare Quick Tunnel. Install `cloudflared`, then leave the
    #                 rest at defaults; args/urlPattern are preset, only `command` (binary path)
    #                 is used. You get a random https://<...>.trycloudflare.com URL.
    #   custom     -> you control everything below (command/args/urlPattern/apiUrl), e.g. ngrok.
    type: "cloudflare"

    # The tunnel binary (or a full path to it). For cloudflare this is the only field that matters.
    command: "cloudflared"

    # The following four only apply when type: "custom". `{port}` is replaced with the panel port.
    args: "http {port}"
    urlPattern: "https://[a-z0-9-]+\\.ngrok[a-z0-9.-]*"   # regex to pull the URL out of output/api
    apiUrl: "http://127.0.0.1:4040/api/tunnels"           # optional local JSON API to poll instead of logs
    readyTimeoutSeconds: 30
    # ^ The custom example above is ngrok (run `ngrok config add-authtoken <token>` once first).

  # ---- Player surface (the /p page players open in-game via /menu) ----

  # Public base URL handed to players in their /menu link, e.g. "http://your-ip:27020".
  # Must be reachable from players' browsers. Leave empty to derive it from bindAddress
  # + port (only works when bindAddress is a routable address, not 127.0.0.1 / 0.0.0.0).
  # When no usable URL is available, /menu tells the player the panel isn't reachable.
  publicBaseUrl: ""

  # How long a player's /menu link stays valid, in minutes.
  playerSessionMinutes: 5
