# Translations for Web Panel.
# Keys are referenced via IStringLocalizer, e.g. m_StringLocalizer["plugin_events:plugin_start"].
plugin_events:
  plugin_start: "Web Panel has been loaded."
  plugin_stop: "Web Panel has been unloaded."

menu:
  # Shown in the Steam overlay confirmation dialog before the browser opens.
  prompt: "Open your personal web panel?"
  opened: "A link to your web panel has been sent — confirm it in the Steam overlay to open."
  unavailable: "Can't create your panel link yet — no public address is available. If the server just started and uses the built-in tunnel, it may still be starting; try /menu again in a few seconds. Otherwise ask an admin to enable the tunnel or set web.publicBaseUrl."
