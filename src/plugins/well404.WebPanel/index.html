<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/jpeg" href="/favicon.ico">
<title>Web Panel</title>
<style>
  :root { --bg:#0f1115; --panel:#171a20; --panel2:#1d2129; --line:#2a303a; --fg:#f4f6f8; --muted:#929aa7; --accent:#6d72f6; --ok:#35b36f; --err:#ef5b61; --radius:12px; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .spacer { flex:1; }
  header input { background:var(--panel2); border:1px solid var(--line); color:var(--fg); border-radius:6px; padding:6px 8px; width:200px; }
  .layout { display:flex; min-height:calc(100vh - 49px); }
  nav { width:220px; background:var(--panel); border-right:1px solid var(--line); padding:8px; }
  nav button { display:block; width:100%; text-align:left; background:none; border:none; color:var(--fg); padding:9px 10px; border-radius:6px; cursor:pointer; font-size:14px; }
  nav button:hover { background:var(--panel2); }
  nav button.active { background:var(--accent); color:#fff; }
  nav .empty { color:var(--muted); padding:10px; font-size:13px; }
  main { flex:1; padding:18px 22px; max-width:1260px; }
  h2 { margin:0 0 14px; font-size:18px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .card h3 { margin:0 0 4px; font-size:15px; }
  .card .desc { color:var(--muted); font-size:13px; margin:0 0 12px; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:12px; color:var(--muted); }
  .field input, .field select { background:var(--panel2); border:1px solid var(--line); color:var(--fg); border-radius:6px; padding:7px 9px; min-width:160px; }
  button.act { background:var(--accent); border:none; color:#fff; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:14px; }
  button.act:hover { filter:brightness(1.1); }
  button.act:disabled { opacity:.5; cursor:default; }
  .savebar { position:sticky; bottom:0; background:linear-gradient(180deg, rgba(30,31,34,0), var(--bg) 40%); padding:14px 0 4px; margin-top:4px; }
  .savebar button.act { padding:10px 28px; font-size:15px; font-weight:600; }
  .msg { margin-top:12px; padding:9px 12px; border-radius:6px; font-size:13px; display:none; white-space:pre-line; }
  .msg.ok { background:rgba(59,165,93,.15); border:1px solid var(--ok); color:#a7e3bd; display:block; }
  .msg.err { background:rgba(237,66,69,.15); border:1px solid var(--err); color:#f5b5b6; display:block; }
  table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
  th, td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:600; }
  tbody tr:hover { background:var(--panel2); }
  .count { color:var(--muted); font-size:12px; margin-top:8px; }
  /* Collection — grid of small blocks (catalog) */
  .tiles { display:flex; flex-wrap:wrap; gap:10px; }
  .tiles.tabbed { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); }
  .tiles.tabbed .tile { min-width:0; max-width:none; }
  .collection-tabs { display:flex; gap:6px; flex-wrap:wrap; margin:0 0 10px; }
  .collection-tabs button { background:transparent; border:1px solid var(--line); color:var(--muted); padding:6px 11px; border-radius:7px; cursor:pointer; }
  .collection-tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tile.dragging { opacity:.45; }
  @media (max-width:950px){ .tiles.tabbed { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  @media (max-width:650px){ .tiles.tabbed { grid-template-columns:1fr; } }
  .tile { position:relative; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:10px 12px; cursor:pointer; min-width:150px; max-width:260px; }
  .tile:hover { border-color:var(--accent); }
  /* Collection — vertical list (per-entity data, e.g. balances) */
  .list { display:flex; flex-direction:column; gap:6px; }
  .lrow { display:flex; align-items:center; gap:10px; background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:8px 12px; cursor:pointer; }
  .lrow:hover { border-color:var(--accent); }
  .slot-title { font-weight:600; font-size:13px; margin-bottom:6px; }
  .lrow .slot-title { margin-bottom:0; flex:0 0 auto; min-width:160px; }
  /* capsule badges separating the elements within one slot */
  .pills { display:flex; flex-wrap:wrap; gap:5px; }
  .lrow .pills { flex:1; }
  .pill { display:inline-block; background:var(--bg); border:1px solid var(--line); border-radius:11px; padding:2px 9px; font-size:12px; }
  .pill.kv { background:var(--panel); color:var(--muted); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:50; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px 18px; min-width:280px; max-width:92%; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .modal .edittitle { font-size:15px; color:var(--fg); margin-bottom:12px; }
  .slot-x { position:absolute; top:6px; right:9px; color:var(--muted); cursor:pointer; font-size:15px; line-height:1; }
  .lrow .slot-x { position:static; margin-left:auto; }
  .tile .slot-x:hover, .lrow .slot-x:hover { color:var(--err); }
  .muted { color:var(--muted); font-size:13px; }
  .editbox { margin-top:12px; padding:12px; border:1px dashed var(--line); border-radius:8px; background:var(--panel2); }
  .edittitle { font-size:13px; color:var(--muted); margin-bottom:10px; }
  button.act.danger { background:var(--err); }
  button.act.ghost { background:transparent; border:1px solid var(--line); color:var(--fg); }
  .plugin-ui-host { display:block; width:100%; }
</style>
</head>
<body>
<header>
  <h1>🛠️ Web Panel</h1>
  <div class="spacer"></div>
  <select id="langSel" title="Language" style="display:none"></select>
</header>
<div class="layout">
  <nav id="nav"><div class="empty">Loading…</div></nav>
  <main id="main"></main>
</div>

<script>
"use strict";
const $ = (sel, el=document) => el.querySelector(sel);
const enc = encodeURIComponent;

let lang = localStorage.getItem("adminpanel_lang") || "";
let languages = [];
const STR = {
  en: { loading:"Loading…", unauthorized:"Unauthorized: the token in the link is invalid or changed — ask an admin for the current link.",
        reqFailed:"Request failed", noModules:"No modules registered yet. They appear here once a WebPanel-aware plugin is installed and loaded.",
        save:"Save", add:"＋ Add", del:"Delete", saveOk:"Saved", search:"Search", enterKeyword:"Enter a keyword…",
        none:"(no entries — click ＋ Add)", saveFail:"Save failed", delFail:"Delete failed", edit:"Edit: ", addItem:"New entry", cancel:"Cancel", confirm:"Confirm", rows:"rows" },
  zh: { loading:"加载中…", unauthorized:"未授权：访问链接中的 token 无效或已变更，请向管理员索取最新链接。",
        reqFailed:"请求失败", noModules:"暂无已注册的模块。安装并加载支持 WebPanel 的插件后会出现在这里。",
        save:"保存", add:"＋ 新增", del:"删除", saveOk:"保存成功", search:"搜索", enterKeyword:"输入关键词…",
        none:"（暂无条目，点「＋ 新增」添加）", saveFail:"保存失败", delFail:"删除失败", edit:"编辑：", addItem:"新增条目", cancel:"取消", confirm:"确认", rows:"行" }
};
function T(k){ return (STR[lang] && STR[lang][k]) || STR.en[k] || k; }
function langQS(){ return lang ? ("lang=" + enc(lang)) : ""; }
const el = (tag, props={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === "class") n.className = v;
    else if (k === "text") n.textContent = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const kid of kids) if (kid != null) n.append(kid);
  return n;
};

// The page is served under a secret token path (…/<token>/), so every relative API call
// carries the token automatically — there is no separate token field to fill in.
function headers(extra={}) {
  return Object.assign({}, extra);
}

async function api(path, opts={}) {
  const q = langQS();
  const url = q ? (path + (path.includes("?") ? "&" : "?") + q) : path;
  const res = await fetch(url, opts);
  if (res.status === 401 || res.status === 404) throw new Error(T("unauthorized"));
  if (!res.ok) throw new Error(T("reqFailed") + ": HTTP " + res.status);
  return res.json();
}

// POST an action; always send a non-empty body (a bodyless POST has no Content-Length,
// which HttpListener rejects with 411).
function invoke(module, action, params) {
  const body = (params && params.toString()) || "_=1";
  return api(`api/modules/${enc(module.id)}/${enc(action.id)}`, {
    method: "POST",
    headers: headers({ "Content-Type": "application/x-www-form-urlencoded" }),
    body
  });
}

let modules = [];
let activeId = null;
let flash = null; // {ok, text} shown once at the next render, near the save button
let refreshIntervalSeconds = 5;
let refreshTimer = null;
let refreshers = [];
let loadingModules = false;

function scheduleRefresh() {
  clearInterval(refreshTimer);
  if (refreshIntervalSeconds <= 0) return;
  refreshTimer = setInterval(() => {
    const tag = deepActiveElement()?.tagName;
    const busy = document.hidden || $(".modal-overlay") || pluginUiModalOpen()
      || ["INPUT","SELECT","TEXTAREA"].includes(tag);
    if (!busy) for (const refresh of [...refreshers]) refresh();
  }, refreshIntervalSeconds * 1000);
}

function deepActiveElement() {
  let active = document.activeElement;
  while (active?.shadowRoot?.activeElement) active = active.shadowRoot.activeElement;
  return active;
}

function pluginUiModalOpen() {
  for (const host of document.querySelectorAll(".plugin-ui-host")) {
    if (host.shadowRoot?.querySelector('[aria-modal="true"]')) return true;
  }
  return false;
}

function buildLangSwitcher() {
  const sel = $("#langSel");
  sel.replaceChildren(...languages.map(l => el("option", { value: l, text: l.toUpperCase() })));
  sel.value = lang;
  sel.style.display = languages.length > 1 ? "" : "none";
  sel.onchange = async () => {
    lang = sel.value;
    localStorage.setItem("adminpanel_lang", lang);
    document.documentElement.lang = lang;
    // Persist server-side so the choice survives the admin URL (tunnel domain) changing.
    try { await api("api/lang", { method:"POST", headers: headers({ "Content-Type":"application/x-www-form-urlencoded" }), body: "lang=" + enc(lang) }); } catch (e) {}
    loadModules();
  };
}

async function loadModules() {
  if (loadingModules) return;
  loadingModules = true;
  const nav = $("#nav");
  let data;
  try {
    data = await api("api/modules", { headers: headers() });
    modules = data.modules || [];
  } catch (e) {
    nav.replaceChildren(el("div", { class:"empty", text: e.message }));
    $("#main").replaceChildren();
    loadingModules = false;
    return;
  }
  languages = data.languages || [];
  refreshIntervalSeconds = Math.max(0, Number(data.refreshIntervalSeconds ?? 5) || 0);
  scheduleRefresh();
  // The server returns the saved admin language (persisted in its data dir); adopt it so the panel
  // always opens in the language last chosen, even on a brand-new admin URL where localStorage is empty.
  lang = data.lang || lang || data.defaultLanguage || "en";
  localStorage.setItem("adminpanel_lang", lang);
  document.documentElement.lang = lang;
  buildLangSwitcher();
  if (!modules.length) {
    nav.replaceChildren(el("div", { class:"empty", text: T("noModules") }));
    $("#main").replaceChildren();
    loadingModules = false;
    return;
  }
  if (!modules.some(m => m.id === activeId)) activeId = modules[0].id;
  nav.replaceChildren(...modules.map(m =>
    el("button", { class: m.id === activeId ? "active" : "", onclick: () => { activeId = m.id; flash = null; render(); } },
      (m.icon ? m.icon + " " : "") + m.title)));
  render();
  loadingModules = false;
}

function render() {
  $("#nav").querySelectorAll("button").forEach((b, i) =>
    b.classList.toggle("active", modules[i] && modules[i].id === activeId));
  const module = modules.find(m => m.id === activeId);
  const main = $("#main");
  refreshers = [];
  if (!module) { main.replaceChildren(); return; }
  main.replaceChildren();
  if (!module.ui || !module.ui.replaceDefault) {
    main.append(el("h2", { text: (module.icon ? module.icon + " " : "") + module.title }));
  }

  if (module.ui) {
    mountCustomAdminUi(module, main);
    if (module.ui.replaceDefault) return;
  }

  const settings = []; // {action, inputs} groups saved together by the page button
  for (const action of module.actions) {
    if (action.hidden) continue;   // invoke-only actions (e.g. a table's per-row action target)
    const built = buildCard(module, action);
    main.append(built.card);
    if (action.kind === "settings") settings.push({ action, inputs: built.inputs });
  }

  // One unified save button at the bottom for every settings group on the page.
  if (settings.length) {
    const msg = el("div", { class:"msg" });
    if (flash) { msg.className = "msg " + (flash.ok ? "ok" : "err"); msg.textContent = flash.text; flash = null; }
    const btn = el("button", { class:"act", text:T("save"), onclick: () => saveAll(module, settings, btn) });
    main.append(el("div", { class:"savebar" }, btn, msg));
  }
}

function mountCustomAdminUi(module, main) {
  const host = el("section", { class:"plugin-ui-host" });
  const root = host.attachShadow({ mode:"open" });
  root.innerHTML = `<style>
    :host{display:block;color:var(--fg);font:14px/1.5 system-ui,Segoe UI,sans-serif}
    *{box-sizing:border-box}button,input,select,textarea{font:inherit}
    ${module.ui.css || ""}
  </style>${module.ui.html || ""}`;
  main.append(host);
  const find = id => module.actions.find(action => action.id === id);
  const modulePrefix = `api/modules/${enc(module.id)}/`;
  const scopedApi = (path, options) => {
    const candidate = String(path || "");
    if (!candidate.startsWith(modulePrefix) || candidate.includes("..")
        || candidate.includes("\\") || candidate.includes("://") || candidate.startsWith("//")) {
      return Promise.reject(new Error("Plugin UI API access is limited to its own module."));
    }
    return api(candidate, options);
  };
  const panel = {
    root, module, lang, el, t:T, find, api:scopedApi, encode:enc,
    invoke:(id, values) => invoke(module, find(id), values instanceof URLSearchParams ? values : new URLSearchParams(values || {})),
    values:id => api(`api/modules/${enc(module.id)}/${enc(id)}/values`, { headers:headers() }),
    records:id => api(`api/modules/${enc(module.id)}/${enc(id)}/records`, { headers:headers() }),
    mountAction:(id, target) => {
      const action = find(id);
      if (!action) return null;
      const built = buildCard(module, action);
      target.append(built.card);
      return { action, inputs:built.inputs };
    },
    saveSettings:(settings, button) => saveAll(module, settings.filter(Boolean), button),
    onRefresh:fn => { if (typeof fn === "function") refreshers.push(fn); }
  };
  try { Function("panel", '"use strict";\n' + (module.ui.javaScript || ""))(panel); }
  catch (error) {
    root.replaceChildren(el("div", { class:"muted", text:"UI error: " + error.message }));
    console.error("WebPanel plugin UI failed", module.id, error);
  }
}

function buildCard(module, action) {
  const card = el("div", { class:"card" }, el("h3", { text: action.label }));
  if (action.description) card.append(el("div", { class:"desc", text: action.description }));
  const msg = el("div", { class:"msg" });
  const out = el("div");
  const inputs = {};

  if (action.kind === "table") {
    card.append(out, msg);
    const refresh = () => invoke(module, action).then(r => showResult(r, msg, out, module)).catch(e => { msg.className = "msg err"; msg.textContent = e.message; });
    refreshers.push(refresh);
    refresh();
  } else if (action.kind === "settings") {
    const row = el("div", { class:"row" });
    for (const f of action.fields) row.append(fieldNode(f, inputs));
    card.append(row, msg, out);
    if (action.hasLoader) {
      api(`api/modules/${enc(module.id)}/${enc(action.id)}/values`, { headers: headers() })
        .then(d => prefill(inputs, action.fields, d.values || {}))
        .catch(() => {});
    }
  } else if (action.kind === "form") {
    const row = el("div", { class:"row" });
    for (const f of action.fields) row.append(fieldNode(f, inputs));
    const btn = el("button", { class:"act", text: action.label, onclick: () => submitForm(module, action, inputs, btn, msg, out) });
    row.append(btn);
    card.append(row, msg, out);
  } else if (action.kind === "search") {
    const f = action.fields[0] || { name:"query", label:T("search"), type:"text", placeholder:T("enterKeyword") };
    card.append(el("div", { class:"row" }, fieldNode(f, inputs)), msg, out);
    let timer = null;
    inputs[f.name].addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        msg.className = "msg";
        invoke(module, action, collect(inputs)).then(r => showResult(r, msg, out, module)).catch(e => { msg.className = "msg err"; msg.textContent = e.message; });
      }, 250);
    });
  } else if (action.kind === "collection") {
    buildCollection(module, action, card, msg);
  }
  return { card, inputs };
}

// A CRUD collection: records shown as a grid of small blocks (default) or a vertical
// list (layout === "list"). Each slot's sub-elements render as separated pill badges.
// Clicking a slot opens its editor pre-filled; "新增" opens a blank one.
function buildCollection(module, action, card, msg) {
  const isList = action.layout === "list";
  const container = el("div", { class: isList ? "list" : "tiles" });
  const editor = el("div");
  const addBtn = el("button", { class:"act", text:T("add"), onclick: () => openEditor(null) });
  card.append(container, el("div", { class:"row", style:"margin-top:10px" }, addBtn), editor, msg);
  let activeGroup = null;

  function reload() {
    editor.replaceChildren();
    msg.className = "msg";
    api(`api/modules/${enc(module.id)}/${enc(action.id)}/records`, { headers: headers() })
      .then(d => paint(d.records || []))
      .catch(e => { msg.className = "msg err"; msg.textContent = e.message; });
  }
  refreshers.push(reload);

  function paint(records) {
    if (action.layout === "tabs-grid") { paintTabbed(records); return; }
    if (!records.length) {
      container.replaceChildren(el("span", { class:"muted", text:T("none") }));
      return;
    }
    container.replaceChildren(...records.map(rec => {
      const title = el("div", { class:"slot-title", text: rec.label });
      const tagPills = (rec.tags || []).map(t => el("span", { class:"pill", text: t }));
      // Summary pills: selected field values shown as "<label>: <value>" using localized field labels.
      const sumPills = (action.summaryFields || []).map(name => {
        const v = rec.values ? rec.values[name] : undefined;
        if (v === undefined || v === "") return null;
        const f = (action.fields || []).find(x => x.name === name);
        return el("span", { class:"pill kv", text: (f ? f.label : name) + ": " + v });
      }).filter(Boolean);
      const pillbox = el("div", { class:"pills" }, ...tagPills, ...sumPills);
      const x = action.hasDelete
        ? el("span", { class:"slot-x", text:"×", title:T("del"), onclick: (e) => { e.stopPropagation(); del(rec); } })
        : null;
      return el("div", { class: isList ? "lrow" : "tile", onclick: () => openEditor(rec) }, title, pillbox, x);
    }));
  }

  function paintTabbed(records) {
    if (!records.length) {
      container.replaceChildren(el("span", { class:"muted", text:T("none") }));
      return;
    }
    const groups = [];
    for (const rec of records) {
      const key = rec.groupKey || rec.group || "";
      if (!groups.some(group => group.key === key)) groups.push({ key, label:rec.group || key });
    }
    if (!groups.some(group => group.key === activeGroup)) activeGroup = groups[0].key;
    const tabs = el("div", { class:"collection-tabs" });
    for (const group of groups) {
      tabs.append(el("button", {
        class:group.key === activeGroup ? "active" : "",
        text:group.label || T("none"),
        onclick:() => { activeGroup = group.key; paintTabbed(records); }
      }));
    }
    const visible = records.filter(rec =>
      (rec.groupKey || rec.group || "") === activeGroup && rec.placement !== "group-header");
    const grid = el("div", { class:"tiles tabbed" });
    for (const rec of visible) {
      const title = el("div", { class:"slot-title", text:rec.label });
      const pills = (rec.tags || []).map(value => el("span", { class:"pill", text:value }));
      for (const name of (action.summaryFields || [])) {
        const value = rec.values ? rec.values[name] : "";
        if (value === undefined || value === "") continue;
        const field = (action.fields || []).find(item => item.name === name);
        pills.push(el("span", { class:"pill kv", text:(field ? field.label : name) + ": " + value }));
      }
      const remove = action.hasDelete
        ? el("span", { class:"slot-x", text:"×", title:T("del"),
            onclick:event => { event.stopPropagation(); del(rec); } })
        : null;
      const tile = el("div", { class:"tile", onclick:() => openEditor(rec) },
        title, el("div", { class:"pills" }, ...pills), remove);
      if (action.hasReorder) {
        tile.draggable = true;
        tile.addEventListener("dragstart", event => {
          tile.classList.add("dragging");
          event.dataTransfer.setData("text/plain", rec.key);
        });
        tile.addEventListener("dragend", () => tile.classList.remove("dragging"));
        tile.addEventListener("dragover", event => event.preventDefault());
        tile.addEventListener("drop", async event => {
          event.preventDefault();
          event.stopPropagation();
          const from = visible.findIndex(item => item.key === event.dataTransfer.getData("text/plain"));
          const to = visible.findIndex(item => item.key === rec.key);
          if (from < 0 || to < 0 || from === to) return;
          const reordered = visible.slice();
          reordered.splice(to, 0, reordered.splice(from, 1)[0]);
          const body = new URLSearchParams();
          body.set("group", activeGroup || "");
          body.set("keys", reordered.map(item => item.key).join("\n"));
          try {
            const result = await api(`api/modules/${enc(module.id)}/${enc(action.id)}/reorder`, {
              method:"POST", headers:headers({ "Content-Type":"application/x-www-form-urlencoded" }), body
            });
            if (!result.success) throw new Error(result.message || T("saveFail"));
            reload();
          } catch (error) {
            msg.className = "msg err"; msg.textContent = error.message;
          }
        });
      }
      grid.append(tile);
    }
    container.replaceChildren(tabs, grid);
  }

  function openEditor(rec) {
    const inputs = {};
    const row = el("div", { class:"row" });
    for (const f of action.fields) {
      const node = fieldNode(f, inputs);
      if (rec && rec.values[f.name] !== undefined) inputs[f.name].value = rec.values[f.name];
      if (rec && f.name === action.keyField) inputs[f.name].disabled = true; // key is locked while editing
      row.append(node);
    }
    const emsg = el("div", { class:"msg" });
    const saveBtn = el("button", { class:"act", text:T("save"), onclick: async () => {
      saveBtn.disabled = true;
      emsg.className = "msg";
      try {
        const values = collect(inputs);
        if (rec) values.set("recordKey", rec.key);
        const r = await invoke(module, action, values);
        if (r.success) { reload(); }
        else { emsg.className = "msg err"; emsg.textContent = r.message || T("saveFail"); saveBtn.disabled = false; }
      } catch (e) { emsg.className = "msg err"; emsg.textContent = e.message; saveBtn.disabled = false; }
    }});
    const actions = el("div", { class:"row", style:"margin-top:10px" }, saveBtn);
    if (rec && action.hasDelete) actions.append(el("button", { class:"act danger", text:T("del"), onclick: () => del(rec) }));
    actions.append(el("button", { class:"act ghost", text:T("cancel"), onclick: () => editor.replaceChildren() }));
    editor.replaceChildren(el("div", { class:"editbox" },
      el("div", { class:"edittitle", text: rec ? T("edit") + rec.label : T("addItem") }), row, actions, emsg));
  }

  async function del(rec) {
    const body = new URLSearchParams(); body.set("key", rec.key);
    msg.className = "msg";
    try {
      const r = await api(`api/modules/${enc(module.id)}/${enc(action.id)}/delete`, {
        method: "POST", headers: headers({ "Content-Type": "application/x-www-form-urlencoded" }), body: body.toString()
      });
      if (r.success) reload();
      else { msg.className = "msg err"; msg.textContent = r.message || T("delFail"); }
    } catch (e) { msg.className = "msg err"; msg.textContent = e.message; }
  }

  reload();
}

function fieldNode(f, inputs) {
  let input;
  if (f.type === "select") {
    input = el("select");
    // For select, option values double as i18n keys server-side; the server already localized
    // the option texts, so value and text are the same localized string here.
    for (const opt of (f.options || [])) input.append(el("option", { value: opt, text: opt }));
  } else if (f.type === "boolean") {
    input = el("select");
    input.append(el("option", { value:"true", text: lang === "zh" ? "是" : "Yes" }),
                 el("option", { value:"false", text: lang === "zh" ? "否" : "No" }));
  } else if (f.type === "textarea") {
    input = el("textarea", { rows: "12", style: "min-width:min(560px,80vw); width:100%; resize:vertical; font:13px/1.5 monospace;" });
    if (f.placeholder) input.placeholder = f.placeholder;
  } else {
    input = el("input", { type: f.type === "number" ? "number" : "text" });
    if (f.type === "number") input.step = "any";
    if (f.placeholder) input.placeholder = f.placeholder;
  }
  inputs[f.name] = input;
  const wrap = el("div", { class:"field" }, el("label", { text: f.label + (f.required ? " *" : "") }), input);
  if (f.type === "textarea") wrap.style.width = "100%";
  return wrap;
}

function collect(inputs) {
  const body = new URLSearchParams();
  for (const [name, node] of Object.entries(inputs)) body.set(name, node.value);
  return body;
}

function prefill(inputs, fields, values) {
  for (const f of fields) {
    if (inputs[f.name] && values[f.name] !== undefined) inputs[f.name].value = values[f.name];
  }
}

async function submitForm(module, action, inputs, btn, msg, out) {
  btn.disabled = true;
  msg.className = "msg";
  try {
    showResult(await invoke(module, action, collect(inputs)), msg, out, module);
  } catch (e) {
    msg.className = "msg err"; msg.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

async function saveAll(module, settings, btn) {
  btn.disabled = true;
  try {
    const lines = [];
    let allOk = true;
    for (const { action, inputs } of settings) {
      const r = await invoke(module, action, collect(inputs));
      if (!r.success) allOk = false;
      lines.push((r.success ? "✓ " : "✗ ") + action.label + (r.message ? "：" + r.message : ""));
    }
    flash = { ok: allOk, text: lines.join("\n") };
    render(); // re-fetch fresh values/tables and show the flash next to the button
  } catch (e) {
    flash = { ok: false, text: e.message };
    render();
  }
}

function showResult(result, msg, out, module) {
  out.replaceChildren();
  if (result.message) {
    msg.className = "msg " + (result.success ? "ok" : "err");
    msg.textContent = result.message;
  } else {
    msg.className = "msg";
  }
  if (result.columns && result.rows) {
    // Optional per-row action (generic): a button that invokes module/<rowActionId> with the row key.
    const hasRowAction = result.rowActionId && module;
    const headCells = result.columns.map(c => el("th", { text: c }));
    if (hasRowAction) headCells.push(el("th", { text: "" }));
    const thead = el("thead", {}, el("tr", {}, ...headCells));
    const tbody = el("tbody", {}, ...result.rows.map((r, i) => {
      const cells = r.map(c => el("td", { text: c }));
      if (hasRowAction) {
        const key = (result.rowKeys && result.rowKeys[i] != null) ? result.rowKeys[i] : r[0];
        const btn = el("button", { class:"act", text: result.rowActionLabel || "+",
          onclick: () => rowAction(module, result.rowActionId, key, btn, msg, result.rowActionFields, result.rowActionLabel) });
        cells.push(el("td", {}, btn));
      }
      return el("tr", {}, ...cells);
    }));
    out.append(el("table", {}, thead, tbody));
    out.append(el("div", { class:"count", text: `${result.rows.length} ${T("rows")}` }));
  }
}

// Invokes a table row's action (e.g. shop quick-add). If the action declares input fields, a popup
// collects them first (so e.g. the admin must set the prices). On success re-renders the module so
// any collection that gained a record reflects it; on failure surfaces the message.
async function rowAction(module, actionId, key, btn, msg, fields, title) {
  let extra = new URLSearchParams();
  if (fields && fields.length) {
    extra = await showModal(title || "", fields);
    if (extra === null) return;   // cancelled
  }
  btn.disabled = true;
  const body = new URLSearchParams(); body.set("key", key);
  for (const [key, value] of extra.entries()) body.set(key, value);
  try {
    const r = await api(`api/modules/${enc(module.id)}/${enc(actionId)}`, {
      method:"POST", headers: headers({ "Content-Type":"application/x-www-form-urlencoded" }), body: body.toString() });
    if (r.success) { flash = { ok:true, text: r.message }; render(); }
    else { msg.className = "msg err"; msg.textContent = r.message || T("saveFail"); btn.disabled = false; }
  } catch (e) { msg.className = "msg err"; msg.textContent = e.message; btn.disabled = false; }
}

// A small modal that collects the given fields and resolves to their values (or null if cancelled).
function showModal(title, fields) {
  return new Promise(resolve => {
    const inputs = {};
    const row = el("div", { class:"row" });
    for (const f of fields) row.append(fieldNode(f, inputs));
    const overlay = el("div", { class:"modal-overlay" });
    const done = (val) => { overlay.remove(); resolve(val); };
    const ok = el("button", { class:"act", text:T("confirm"), onclick: () => done(collect(inputs)) });
    const cancel = el("button", { class:"act ghost", text:T("cancel"), onclick: () => done(null) });
    overlay.append(el("div", { class:"modal", role:"dialog", "aria-modal":"true" },
      el("div", { class:"edittitle", text: title }), row,
      el("div", { class:"row", style:"margin-top:12px" }, ok, cancel)));
    let pressedOutside = false;
    overlay.addEventListener("pointerdown", (e) => { pressedOutside = e.target === overlay; });
    overlay.addEventListener("pointerup", (e) => {
      const shouldClose = pressedOutside && e.target === overlay;
      pressedOutside = false;
      if (shouldClose) done(null);
    });
    overlay.addEventListener("pointercancel", () => { pressedOutside = false; });
    document.body.append(overlay);
    const first = fields[0] && inputs[fields[0].name]; if (first) first.focus();
  });
}

loadModules();
</script>
