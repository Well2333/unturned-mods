name: Publish to NuGet

# Publishes every packable plugin to nuget.org when a GitHub Release is
# published. --skip-duplicate means only versions not already on nuget.org are
# actually pushed, so bump a plugin's <Version> in its .csproj before releasing.
on:
  release:
    types: [published]
  # Allow a manual dry-run / re-publish from the Actions tab.
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore UnturnedMods.sln

      # Build first, then pack with --no-build. Packing during build
      # (GeneratePackageOnBuild=true) conflicts with a solution-level
      # `dotnet pack`, causing NU5026; this two-step avoids it.
      - name: Build
        run: dotnet build UnturnedMods.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack UnturnedMods.sln --configuration Release --no-build --output ${{ runner.temp }}/packages

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Add it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          dotnet nuget push "${{ runner.temp }}/packages/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source "$NUGET_SOURCE" \
            --skip-duplicate
