name: Publish to NuGet

# Publish exactly one allow-listed package from a GitHub Release tag:
#   <PluginId>/v<MAJOR.MINOR.PATCH>
# The tag must point to origin/main and match the project version.
on:
  release:
    types: [published]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Verify release source
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::Release tag must point to the current origin/main commit."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: 8.0.x

      - name: Determine release target
        id: target
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          if [[ "$TAG" =~ ^(well404\.(AdminTools|AutoSave|Economy|Essentials|Shop|Vault|WebPanel|UnturnedMods\.Shared))/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "plugin=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[3]}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Release tag must be an allow-listed PluginId/vMAJOR.MINOR.PATCH."
            exit 1
          fi

      - name: Restore
        run: dotnet restore UnturnedMods.sln

      - name: Test release commit
        run: dotnet test UnturnedMods.sln --configuration Release --no-restore

      - name: Build and pack
        run: |
          set -euo pipefail
          OUT="${{ runner.temp }}/packages"
          mkdir -p "$OUT"
          PLUGIN="${{ steps.target.outputs.plugin }}"
          if [ "$PLUGIN" = "well404.UnturnedMods.Shared" ]; then
            PROJ="src/Shared/UnturnedMods.Shared/UnturnedMods.Shared.csproj"
          else
            PROJ="src/plugins/$PLUGIN/$PLUGIN.csproj"
          fi
          test -f "$PROJ"
          TAG_VERSION="${{ steps.target.outputs.version }}"
          PROJECT_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' "$PROJ")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match $PROJ version '$PROJECT_VERSION'."
            exit 1
          fi
          dotnet build "$PROJ" --configuration Release --no-restore
          dotnet pack "$PROJ" --configuration Release --no-build --output "$OUT"

      - name: NuGet login (OIDC)
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544
        id: nuget_login
        with:
          user: Well404

      - name: Push to NuGet
        run: |
          dotnet nuget push "${{ runner.temp }}/packages/*.nupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source "$NUGET_SOURCE" \
            --skip-duplicate
