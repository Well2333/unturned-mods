name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore UnturnedMods.sln

      - name: Build
        run: dotnet build UnturnedMods.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test UnturnedMods.sln --configuration Release --no-build --verbosity normal

      # Validate that every packable plugin still packs cleanly (catches packaging
      # errors before a release). Packages are discarded.
      - name: Pack (validation)
        run: dotnet pack UnturnedMods.sln --configuration Release --no-build --output ${{ runner.temp }}/packages
